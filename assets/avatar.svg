<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="polyedre avatar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1c1f"/>
      <stop offset="1" stop-color="#0c0d0e"/>
    </linearGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="currentColor" stop-opacity=".95"/>
      <stop offset="1" stop-color="currentColor" stop-opacity=".55"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="14" fill="url(#bg)"/>
  <!-- placeholder fox-ish animal-humanoid head, geometric -->
  <g stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" fill="none">
    <!-- ears -->
    <path d="M28 38 L22 16 L40 28 Z" fill="url(#fur)"/>
    <path d="M72 38 L78 16 L60 28 Z" fill="url(#fur)"/>
    <!-- inner ears -->
    <path d="M28 33 L26 21 L33 28 Z" fill="#0c0d0e" stroke="none" opacity=".7"/>
    <path d="M72 33 L74 21 L67 28 Z" fill="#0c0d0e" stroke="none" opacity=".7"/>
    <!-- head -->
    <path d="M22 42 Q22 76 50 86 Q78 76 78 42 Q70 30 50 32 Q30 30 22 42 Z" fill="url(#fur)"/>
    <!-- snout patch -->
    <path d="M38 60 Q50 74 62 60 Q60 70 50 74 Q40 70 38 60 Z" fill="#0c0d0e" stroke="none" opacity=".75"/>
    <!-- eyes (terminal-cursor style) -->
    <rect x="36" y="48" width="6" height="6" rx="1" fill="currentColor" stroke="none"/>
    <rect x="58" y="48" width="6" height="6" rx="1" fill="currentColor" stroke="none"/>
    <!-- nose -->
    <path d="M48 64 L52 64 L50 67 Z" fill="currentColor" stroke="none"/>
    <!-- mouth -->
    <path d="M46 70 Q50 72 54 70"/>
    <!-- forehead mark (polyhedron hint) -->
    <path d="M44 40 L50 36 L56 40 L53 44 L47 44 Z" stroke="currentColor" stroke-width="1" opacity=".7"/>
  </g>
  <!-- corner brackets, TUI vibe -->
  <g stroke="currentColor" stroke-width="1" opacity=".55" fill="none">
    <path d="M6 12 L6 6 L12 6"/>
    <path d="M88 6 L94 6 L94 12"/>
    <path d="M6 88 L6 94 L12 94"/>
    <path d="M88 94 L94 94 L94 88"/>
  </g>
  <style>svg { color: hsl(var(--hue, 35), 70%, 60%); }</style>
</svg>
